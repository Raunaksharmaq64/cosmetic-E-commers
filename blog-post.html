<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORÉ — Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body{overflow-x:hidden}
        #navbar{background:rgba(15,15,15,0.85);backdrop-filter:blur(12px);padding:0.6rem 0}

        .post-cover{width:100%;height:55vh;min-height:350px;object-fit:cover;display:block}
        .post-cover-placeholder{width:100%;height:40vh;background:linear-gradient(135deg,rgba(201,169,110,0.08),rgba(15,15,15,1));display:flex;align-items:center;justify-content:center;font-size:5rem;color:rgba(201,169,110,0.15)}

        .post-container{max-width:780px;margin:0 auto;padding:var(--space-xl) var(--space-md)}

        .post-meta{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;margin-bottom:var(--space-md)}
        .post-category{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--color-gold);padding:4px 12px;border:1px solid rgba(201,169,110,0.3);border-radius:20px}
        .post-date,.post-read{font-size:0.8rem;color:var(--color-gray)}
        .post-author{font-size:0.8rem;color:var(--color-ivory)}

        .post-title{font-size:clamp(2rem,5vw,3.2rem);line-height:1.15;margin-bottom:var(--space-md)}

        .post-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:var(--space-lg)}
        .post-tag{padding:4px 10px;font-size:0.65rem;letter-spacing:0.1em;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:20px;color:var(--color-gray)}

        /* Article Content */
        .post-content{font-size:1.05rem;color:var(--color-gray);line-height:1.9;font-weight:300}
        .post-content p{margin-bottom:1.5rem}
        .post-content h2{font-family:var(--font-heading);font-size:1.6rem;color:var(--color-ivory);margin:2.5rem 0 1rem}
        .post-content h3{font-family:var(--font-heading);font-size:1.3rem;color:var(--color-ivory);margin:2rem 0 0.8rem}
        .post-content strong{color:var(--color-ivory);font-weight:500}
        .post-content em{color:var(--color-gold);font-style:italic}
        .post-content ul,.post-content ol{margin:1rem 0 1.5rem 1.5rem}
        .post-content li{margin-bottom:0.5rem}
        .post-content blockquote{border-left:3px solid var(--color-gold);padding:1rem 1.5rem;margin:2rem 0;background:rgba(201,169,110,0.04);border-radius:0 8px 8px 0;font-style:italic;color:var(--color-ivory);font-size:1.1rem}
        .post-content img{width:100%;border-radius:8px;margin:2rem 0}

        .post-divider{width:60px;height:1px;background:var(--color-gold);margin:var(--space-xl) auto;opacity:0.4}

        .back-link{display:inline-flex;align-items:center;gap:8px;font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-gold);margin-bottom:var(--space-lg);transition:gap 0.3s}
        .back-link:hover{gap:12px}

        /* Share */
        .share-section{text-align:center;padding:var(--space-lg) 0}
        .share-section p{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--color-gray);margin-bottom:1rem}
        .share-btns{display:flex;gap:1rem;justify-content:center}
        .share-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;color:var(--color-gray);font-size:0.85rem;cursor:pointer;transition:all 0.3s;background:transparent;text-decoration:none}
        .share-btn:hover{border-color:var(--color-gold);color:var(--color-gold)}

        .post-error{text-align:center;padding:200px 20px;min-height:100vh}
        .post-error h2{margin-bottom:1rem}
        .post-error a{color:var(--color-gold);text-decoration:underline}

        @media(max-width:600px){
            .post-cover{height:40vh;min-height:250px}
            .post-container{padding:var(--space-md)}
            .post-content{font-size:0.95rem}
        }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">VELORÉ</a>
            <div class="nav-links" id="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="shop.html" class="nav-link">Shop</a>
                <a href="blog.html" class="nav-link" style="color:var(--color-gold)">Journal</a>
                <a href="contact.html" class="nav-link">Contact</a>
                <a href="#" class="nav-link" id="nav-auth-btn">Sign In</a>
            </div>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div id="post-page" style="display:none">
        <div id="cover-area"></div>
        <div class="post-container">
            <a href="blog.html" class="back-link">← Back to Journal</a>
            <div class="post-meta" id="post-meta"></div>
            <h1 class="post-title" id="post-title"></h1>
            <div class="post-tags" id="post-tags"></div>
            <article class="post-content" id="post-content"></article>
            <div class="post-divider"></div>
            <div class="share-section">
                <p>Share this article</p>
                <div class="share-btns">
                    <a class="share-btn" id="share-twitter" href="#" target="_blank" title="Twitter">𝕏</a>
                    <a class="share-btn" id="share-linkedin" href="#" target="_blank" title="LinkedIn">in</a>
                    <button class="share-btn" id="share-copy" title="Copy link">🔗</button>
                </div>
            </div>
        </div>
    </div>

    <div class="post-error" id="post-error" style="display:none">
        <h2>Post not found</h2>
        <a href="blog.html">Back to Journal</a>
    </div>

    <script src="js/toast.js"></script>
    <script src="js/premium.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Mobile nav
        const toggle = document.getElementById('nav-toggle');
        if(toggle) toggle.addEventListener('click', () => { document.getElementById('nav-links').classList.toggle('open'); toggle.classList.toggle('active'); });
        const authBtn = document.getElementById('nav-auth-btn');
        const token = localStorage.getItem('token'), userName = localStorage.getItem('userName');
        if (token && userName && authBtn) { authBtn.innerText = `Hi, ${userName}`; authBtn.href = 'account.html'; }

        const slug = new URLSearchParams(window.location.search).get('slug');
        if (!slug) { document.getElementById('post-error').style.display = 'block'; return; }

        try {
            const res = await fetch(`/api/blogs/${slug}`);
            if (!res.ok) throw new Error();
            const blog = await res.json();

            document.title = `VELORÉ — ${blog.title}`;

            // Cover
            const coverArea = document.getElementById('cover-area');
            if (blog.coverImage) {
                coverArea.innerHTML = `<img class="post-cover" src="${blog.coverImage}" alt="${blog.title}" style="margin-top:80px">`;
            } else {
                coverArea.innerHTML = `<div class="post-cover-placeholder" style="margin-top:80px">✦</div>`;
            }

            // Meta
            document.getElementById('post-meta').innerHTML = `
                <span class="post-category">${blog.category || 'skincare'}</span>
                <span class="post-date">${new Date(blog.createdAt).toLocaleDateString('en-IN', {year:'numeric', month:'long', day:'numeric'})}</span>
                <span class="post-read">${blog.readTime || 3} min read</span>
                <span class="post-author">By ${blog.author || 'VELORÉ Team'}</span>
            `;

            document.getElementById('post-title').textContent = blog.title;

            // Tags
            if (blog.tags?.length) {
                document.getElementById('post-tags').innerHTML = blog.tags.map(t => `<span class="post-tag">#${t}</span>`).join('');
            }

            // Content — render with basic markdown-like formatting
            let content = blog.content;
            // Convert line breaks to paragraphs
            content = content.split('\n\n').map(p => {
                p = p.trim();
                if (!p) return '';
                if (p.startsWith('## ')) return `<h2>${p.substring(3)}</h2>`;
                if (p.startsWith('### ')) return `<h3>${p.substring(4)}</h3>`;
                if (p.startsWith('> ')) return `<blockquote>${p.substring(2)}</blockquote>`;
                // Bold and italic
                p = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                p = p.replace(/\*(.+?)\*/g, '<em>$1</em>');
                return `<p>${p}</p>`;
            }).join('');
            document.getElementById('post-content').innerHTML = content;

            document.getElementById('post-page').style.display = 'block';

            // Share
            const url = window.location.href;
            document.getElementById('share-twitter').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(blog.title)}&url=${encodeURIComponent(url)}`;
            document.getElementById('share-linkedin').href = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`;
            document.getElementById('share-copy').addEventListener('click', () => {
                navigator.clipboard.writeText(url);
                if (window.VeloreToast) VeloreToast.show('Link copied!', 'success');
            });

        } catch(e) {
            console.error(e);
            document.getElementById('post-error').style.display = 'block';
        }
    });
    </script>
</body>
</html>
